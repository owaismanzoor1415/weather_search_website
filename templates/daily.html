<!doctype html>
<html>

<head>

<title>Daily — {{ city }}</title>

<link rel="stylesheet"
href="{{ url_for('static', filename='css/daily.css') }}">

</head>

<body>

<!-- HEADER -->

<div class="header">

<div class="title">
5-DAY WEATHER FORECAST
</div>

<div class="city">
{{ city|capitalize }}
</div>

</div>

<!-- SLIDER -->

<div class="slider" id="slider">

{% for d in days %}

<div class="slide">

<div class="day">
{{ d.label }}
</div>

<div class="date">
{{ d.date }}
</div>

<div class="icon">
{{ d.icon }}
</div>

<div class="temp">
{{ d.hi }}°C
</div>

<div class="low">
↓ {{ d.lo }}°C
</div>

<div class="desc">
{{ d.desc }}
</div>

</div>

{% endfor %}

</div>

<!-- BACK BUTTON -->

<a href="/" id="backBtn" class="back">← Back</a>

<script src="{{ url_for('static', filename='js/daily.js') }}"></script>

</body>

</html>
