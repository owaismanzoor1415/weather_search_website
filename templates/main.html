<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">

<title>SkyCast</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<meta name="theme-color" content="#0f172a">

<link rel="manifest" href="{{ url_for('static', filename='manifest.json') }}">

<link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

</head>

<body>

<header class="hero">

<div class="topbar">
<div class="brand">☁️ SkyCast</div>

<div class="top-buttons">
<a id="btn-today" href="#">TODAY WEATHER</a>
<a id="btn-hourly" href="#">HOURLY WEATHER</a>
<a id="btn-daily" href="#">DAILY WEATHER</a>
</div>
</div>

<div class="hero-center">

<div class="search-wrap">

<div class="search-input">
<input id="cityInput" placeholder="Enter the city">
</div>

<button id="searchBtn" class="search-action">Search</button>

</div>

</div>

</header>

<main class="content">

<h3 class="section-title">Recent Locations</h3>
<div id="historyList" class="history"></div>

<h3 class="section-title">Map</h3>

<!-- Map search box (restored) -->
<div class="map-search-box">
<input id="mapSearchInput" placeholder="Search city on map (e.g. Baramulla)">
<button id="mapSearchBtn">Go</button>
<button id="locateMeBtn">Locate Me</button>
</div>

<!-- Map -->
<div id="owmMap"></div>

</main>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script src="{{ url_for('static', filename='js/main.js') }}"></script>

</body>
</html>
