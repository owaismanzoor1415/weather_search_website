<!DOCTYPE html>
<html>

<head>

<title>Hourly — {{ city }}</title>

<link rel="stylesheet"
href="{{ url_for('static', filename='css/hourly.css') }}">

</head>

<body data-weather="{{ hourly[0].desc if hourly else '' }}">

<div class="header">
{{ city }}
</div>

<div class="container">

{% for h in hourly %}

<div class="hour-box {% if h.is_now %}now{% endif %}">

<div class="time">
{{ h.time }}
</div>

<div class="icon">
{{ h.icon }}
</div>

<div class="temp">
{{ h.temp }}°C
</div>

</div>

{% endfor %}

</div>

<a href="/" class="back">
← Back
</a>

<script src="{{ url_for('static', filename='js/hourly.js') }}"></script>

</body>
</html>
